<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexuz | Software Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-obsidian { background-color: #0a0a0a; }
        .text-violet-accent { color: #8b5cf6; }
        .border-violet-accent { border-color: #8b5cf6; }
    </style>
</head>
<body class="bg-obsidian text-gray-100">

    <nav class="flex items-center justify-between px-8 py-6 border-b border-gray-800">
        <div class="flex items-center space-x-3">
            <img src="Main_Logo.png" alt="Company Logo" class="h-10 w-auto">
            <span class="text-xl font-bold tracking-tight">NEXUZ</span>
        </div>
        <div class="hidden md:flex space-x-8 text-sm font-medium">
            <a href="pages/services.html" class="hover:text-violet-accent transition">Services</a>
            <a href="#" class="hover:text-violet-accent transition">Projects</a>
            <a href="#" class="hover:text-violet-accent transition">Contact</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-8 py-24 text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6">
            Engineering the <span class="text-violet-accent">Future</span>
        </h1>
        <p class="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto mb-10">
            Streamlining complex workflows through intelligent automation and robust software architecture.
        </p>
        <div class="flex flex-col md:flex-row justify-center space-y-4 md:space-y-0 md:space-x-4">
            <button class="bg-violet-accent hover:bg-violet-700 text-white px-8 py-4 rounded-lg font-semibold transition">
                Get Started
            </button>
            <button class="border border-gray-700 hover:border-gray-500 px-8 py-4 rounded-lg font-semibold transition">
                View Portfolio
            </button>
        </div>
    </main>

    <footer class="border-t border-gray-800 py-12 px-8 mt-20">
        <div class="flex flex-col md:flex-row justify-between items-center">
            <img src="Main_Logo.png" alt="Company Logo" class="h-8 opacity-50 mb-4 md:mb-0">
            <p class="text-gray-500 text-sm">© 2026 Nexuz Corporation. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
